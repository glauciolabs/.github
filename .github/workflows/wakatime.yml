name: WakaTime Metrics Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wakatime-metrics-update
  cancel-in-progress: true

jobs:
  update-elastic-graph:
    name: Update Elastic Activity Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT_GH_PROFILE_STATS }}
          ref: master

      - name: Generate elastic SVG from GitHub activity
        env:
          GH_TOKEN: ${{ secrets.PAT_GH_PROFILE_STATS }}
          GH_USER: glauciocampos
        run: |
          set -euo pipefail
          mkdir -p images
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone

          token = os.environ["GH_TOKEN"]
          user = os.environ.get("GH_USER", "glauciocampos")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "User-Agent": "glauciolabs-elastic-graph",
          }

          events = []
          for page in range(1, 11):
              url = f"https://api.github.com/users/{user}/events/public?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              if not payload:
                  break
              events.extend(payload)

          today = datetime.now(timezone.utc).date()
          start = today - timedelta(days=29)
          days = [start + timedelta(days=i) for i in range(30)]
          counts = {d: 0 for d in days}

          for e in events:
              ts = e.get("created_at")
              if not ts:
                  continue
              try:
                  d = datetime.fromisoformat(ts.replace("Z", "+00:00")).date()
              except Exception:
                  continue
              if d not in counts:
                  continue
              t = e.get("type", "")
              if t == "PushEvent":
                  counts[d] += 3
              elif t in {"PullRequestEvent", "IssuesEvent"}:
                  counts[d] += 2
              else:
                  counts[d] += 1

          vals = [counts[d] for d in days]
          mx = max(max(vals), 1)
          total = sum(vals)
          avg = total / len(vals)
          active_days = sum(1 for v in vals if v > 0)
          peak = max(vals)

          W, H = 1200, 330
          cell, gap = 22, 6
          cols = 30
          x0, y0 = 70, 110

          def color(v):
              if v == 0:
                  return "#1a2740"
              r = v / mx
              if r < 0.25:
                  return "#204a69"
              if r < 0.5:
                  return "#1f7a9a"
              if r < 0.75:
                  return "#28a8b5"
              return "#66d9e8"

          cells = []
          labels = []
          for i, (d, v) in enumerate(zip(days, vals)):
              x = x0 + i * (cell + gap)
              y = y0
              cells.append(f'<rect x="{x}" y="{y}" width="{cell}" height="{cell}" rx="6" fill="{color(v)}"/>')
              if i % 5 == 0:
                  labels.append(f'<text x="{x + cell/2:.1f}" y="{y+38}" font-size="11" fill="#8faac3" text-anchor="middle">{d.strftime("%d %b")}</text>')

          legend = [
              ("#1a2740", "0"),
              ("#204a69", "Low"),
              ("#1f7a9a", "Medium"),
              ("#28a8b5", "High"),
              ("#66d9e8", "Peak"),
          ]
          lg = []
          lx = W - 320
          ly = 282
          for i, (c, t) in enumerate(legend):
              x = lx + i * 58
              lg.append(f'<rect x="{x}" y="{ly}" width="16" height="16" rx="4" fill="{c}"/>')
              lg.append(f'<text x="{x+21}" y="{ly+13}" font-size="10" fill="#b9cbe0">{t}</text>')

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}" viewBox="0 0 {W} {H}">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0b132b"/>
              <stop offset="55%" stop-color="#1c2541"/>
              <stop offset="100%" stop-color="#243b55"/>
            </linearGradient>
          </defs>
          <rect width="100%" height="100%" rx="18" fill="url(#bg)"/>
          <text x="28" y="40" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#e6edf3" font-weight="700">Engineering Activity Heatmap</text>
          <text x="28" y="62" font-size="12" font-family="Segoe UI, Arial, sans-serif" fill="#9fb3c8">Last 30 days • Score model: Push=3, PR/Issue=2, Other events=1</text>
          <text x="{W-28}" y="40" font-size="13" font-family="Segoe UI, Arial, sans-serif" fill="#9fb3c8" text-anchor="end">Total: {total}   Active: {active_days}/30   Peak: {peak}   Avg/day: {avg:.1f}</text>
          <line x1="70" y1="96" x2="{W-30}" y2="96" stroke="#8ba3bb" stroke-opacity="0.2"/>
          {''.join(cells)}
          {''.join(labels)}
          <text x="70" y="282" font-size="11" fill="#9fb3c8">Legend</text>
          {''.join(lg)}
          </svg>'''

          with open("images/elastic_activity.svg", "w", encoding="utf-8") as f:
              f.write(svg)
          PY

      - name: Commit and push graph updates
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- images/elastic_activity.svg)" ]; then
            echo "No graph changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/elastic_activity.svg
          git commit -m "docs(profile): update elastic activity graph"
          git push origin master

  update-charts:
    name: Update WakaTime charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate WakaTime chart images
        uses: dvjn/wakatime-charts@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_GH_PROFILE_STATS }}
          BRANCH_NAME: master
          IMAGES_FOLDER: images
          COMMIT_MESSAGE: "docs(profile): update WakaTime charts"
