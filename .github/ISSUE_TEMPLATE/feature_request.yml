name: ✨ Feature Request
description: Suggest an idea, architectural improvement, or security enhancement
title: "[FEATURE]: "
labels: ["enhancement", "triage"]
assignees:
  - gcampos
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement! Please provide a clear and concise description of the feature and its technical justification.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
